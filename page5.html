<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>พัก</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:24px;
    text-align:center;
}

/* ข้อความ (ซ่อนก่อน) */
#text{
    display:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="text">
โปรดพักสายตาสักครู่<br>
เมื่อพร้อมแล้วให้คลิกหน้าจอเพื่อดำเนินการต่อ
</div>

<script>
window.onload = function(){

    const mode = localStorage.getItem("readyMode");

    // 🟢 โหมดกดเมื่อพร้อม (ก่อนคำถามสุดท้าย)
    if(mode === "true"){
        const text = document.getElementById("text");
        text.style.display = "block";

        document.body.onclick = function(){
            window.location.href = "page6.html";
        }
    }
    else{
        // 🔵 โหมดพัก 3 วิ (หน้าดำล้วน)
        setTimeout(function(){
            window.location.href = "page6.html";
        },3000);
    }

}
</script>

</body>
</html>
