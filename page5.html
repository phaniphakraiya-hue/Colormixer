<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>พักสายตา</title>
<style>
body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}
#restText{
    color:white;
    font-size:28px;
    text-align:center;
    display:none;
    font-family: Arial, sans-serif;
}
</style>
</head>
<body>

<div id="restText"></div>

<script>
window.onload = function(){

    const readyMode = localStorage.getItem("readyMode");   // หลังหน้า 2 → เริ่มการทดลอง
    const finalPause = localStorage.getItem("finalPause"); // หลังคำถามสุดท้ายของชุด
    const restText = document.getElementById("restText");

    // หน้า 2 → กดเมื่อพร้อม (เริ่มการทดลอง)
    if(readyMode === "true"){
        restText.style.display = "block";
        restText.innerHTML = "โปรดพักสายตาสักครู่<br>กดเมื่อพร้อม";
        document.body.style.cursor = "pointer";

        document.body.onclick = function(){
            localStorage.removeItem("readyMode");
            window.location.href = "page3.html"; // ไปคำถามชุดแรก
        }
    }

    // คำถามสุดท้ายของชุด → กดเมื่อพร้อม
    else if(finalPause === "true"){
        restText.style.display = "block";
        restText.innerHTML = "โปรดพักสายตาสักครู่<br>กดเมื่อพร้อม";
        document.body.style.cursor = "pointer";

        document.body.onclick = function(){
            localStorage.removeItem("finalPause");
            window.location.href = "page3.html"; // ไปคำถามชุดถัดไป
        }
    }

    // หน้าอื่น ๆ → พัก 3 วิ + เสียง (สามารถใส่ audio ใน page4)
    else{
        // ตัวนี้ไม่ใช่ page5 → สามารถเพิ่มเสียงที่ page4 ได้
        setTimeout(function(){
            window.location.href = "page3.html"; 
        }, 3000); // 3 วินาที
    }

}
</script>

</body>
</html>
