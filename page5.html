<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>พัก</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:24px;
    text-align:center;
}

#text{
    display:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="text">
โปรดพักสายตาสักครู่<br>
เมื่อพร้อมแล้วให้คลิกหน้าจอเพื่อดำเนินการต่อ
</div>

<script>
window.onload = function(){

    const mode = localStorage.getItem("readyMode");

    const questions = JSON.parse(localStorage.getItem("questionOrder")) || [];
    const current = parseInt(localStorage.getItem("currentQuestion")) || 0;

    // 🔥 ฟังก์ชันตัดสินว่าจะไปไหน
    function goNext(){
        if(current >= questions.length){
            // ✅ ทำครบแล้ว → ไปหน้าสุดท้าย
            window.location.href = "page6.html";
        }else{
            // 🔄 ยังไม่ครบ → ไปผสมสีต่อ
            window.location.href = "page4.html";
        }
    }

    // 🟢 โหมดกดเมื่อพร้อม
    if(mode === "true"){
        const text = document.getElementById("text");
        text.style.display = "block";

        document.body.onclick = function(){
            goNext();
        }
    }
    else{
        // 🔵 พัก 3 วิ
        setTimeout(function(){
            goNext();
        },3000);
    }

}
</script>

</body>
</html>
